general {
    lock_cmd = pidof hyprlock || hyprlock 
    before_sleep_cmd = pidof hyprlock || hyprlock 
    after_sleep_cmd = hyprctl dispatch dpms on 
}

listener {
    timeout = 300
    on-timeout = cat /sys/class/power_supply/AC*/online | grep -q '0' && hyprctl dispatch dpms off  
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 330
    on-timeout = cat /sys/class/power_supply/AC*/online | grep -q '0' && systemctl suspend 
}

listener {
    timeout = 7200 
    on-timeout = hyprctl dispatch dpms off && systemctl suspend 
}
